<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Spreader - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #c9d1d9; }
        .card { background: #161b22; border: 1px solid #30363d; }
        .form-control { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; }
        .form-control:focus { background: #0d1117; border-color: #58a6ff; color: #c9d1d9; }
        .btn-primary { background: #238636; border: none; }
        .btn-primary:hover { background: #2ea043; }
        .brand { color: #25D366; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h1 class="brand">💬 WhatsApp Spreader</h1>
                    <p class="text-secondary">Pentest Broadcasting Tool</p>
                </div>
                
                <div class="card p-4">
                    <ul class="nav nav-tabs mb-3" id="loginTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="user-tab" data-bs-toggle="tab" data-bs-target="#user" type="button">User Login</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin" type="button">Admin</button>
                        </li>
                    </ul>
                    
                    <div class="tab-content">
                        <!-- User Login -->
                        <div class="tab-pane fade show active" id="user">
                            <form action="/login" method="POST">
                                <h5>User Login</h5>
                                <p class="text-secondary small">Enter your login key to access the dashboard</p>
                                <div class="mb-3">
                                    <label class="form-label">Login Key</label>
                                    <input type="text" name="login_key" class="form-control" placeholder="WS-XXXXXXXXXXXXXXXX" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Access Dashboard</button>
                            </form>
                        </div>
                        
                        <!-- Admin Login -->
                        <div class="tab-pane fade" id="admin">
                            <form action="/admin/login" method="POST">
                                <h5>Admin Login</h5>
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" name="username" class="form-control" placeholder="admin" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" name="password" class="form-control" placeholder="••••••" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Login</button>
                            </form>
                            <hr class="text-secondary">
                            <form action="/admin/register" method="POST" class="mt-3">
                                <h6>Register New Admin</h6>
                                <div class="mb-2">
                                    <input type="text" name="username" class="form-control" placeholder="New username" required>
                                </div>
                                <div class="mb-2">
                                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                                </div>
                                <button type="submit" class="btn btn-outline-secondary w-100">Register</button>
                            </form>
                        </div>
                    </div>
                    
                    {% if error %}
                    <div class="alert alert-danger mt-3 py-2">{{ error }}</div>
                    {% endif %}
                    {% if success %}
                    <div class="alert alert-success mt-3 py-2">{{ success }}</div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

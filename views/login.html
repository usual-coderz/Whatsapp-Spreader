<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Broadcasting Panel</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .tab-active {
            border-bottom: 2px solid #25D366;
            color: #25D366;
        }
        .btn-whatsapp {
            background: #25D366;
            transition: all 0.3s;
        }
        .btn-whatsapp:hover {
            background: #1da851;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
        .input-field {
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #25D366;
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl shadow-2xl w-full max-w-md p-8 border border-gray-200/20">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-green-400 to-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">WhatsApp Panel</h1>
            <p class="text-gray-500 text-sm mt-1">Broadcast Management System</p>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 mb-6">
            <button id="adminTab" class="tab-active flex-1 py-3 text-center font-medium text-sm transition-all" onclick="switchTab('admin')">
                Admin Login
            </button>
            <button id="userTab" class="flex-1 py-3 text-center font-medium text-sm text-gray-500 hover:text-gray-700 transition-all" onclick="switchTab('user')">
                User Login
            </button>
        </div>

        <!-- Admin Login Form -->
        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                    class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none text-sm"
                    placeholder="admin@panel.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none text-sm"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="btn-whatsapp w-full text-white font-medium py-2.5 rounded-lg text-sm">
                Login as Admin
            </button>
            <div id="adminError" class="text-red-500 text-sm text-center hidden"></div>
        </form>

        <!-- User Login Form -->
        <form id="userLoginForm" class="space-y-4 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required
                    class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none text-sm"
                    placeholder="Enter username">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none text-sm"
                    placeholder="••••••••">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Login Key</label>
                <input type="text" name="loginKey" required
                    class="input-field w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none text-sm"
                    placeholder="Key from admin (e.g. ABC12345)">
            </div>
            <button type="submit"
                class="btn-whatsapp w-full text-white font-medium py-2.5 rounded-lg text-sm">
                Login as User
            </button>
            <div id="userError" class="text-red-500 text-sm text-center hidden"></div>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">
            Authorized access only. All activities are monitored.
        </p>
    </div>

    <script>
        function switchTab(tab) {
            const adminForm = document.getElementById('adminLoginForm');
            const userForm = document.getElementById('userLoginForm');
            const adminTab = document.getElementById('adminTab');
            const userTab = document.getElementById('userTab');

            if (tab === 'admin') {
                adminForm.classList.remove('hidden');
                userForm.classList.add('hidden');
                adminTab.classList.add('tab-active');
                adminTab.classList.remove('text-gray-500');
                userTab.classList.remove('tab-active');
                userTab.classList.add('text-gray-500');
            } else {
                adminForm.classList.add('hidden');
                userForm.classList.remove('hidden');
                userTab.classList.add('tab-active');
                userTab.classList.remove('text-gray-500');
                adminTab.classList.remove('tab-active');
                adminTab.classList.add('text-gray-500');
            }
        }

        // Admin Login
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const errorDiv = document.getElementById('adminError');

            try {
                const res = await fetch('/api/auth/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    window.location.href = '/admin/dashboard';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.remove('hidden');
            }
        });

        // User Login
        document.getElementById('userLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const errorDiv = document.getElementById('userError');

            try {
                const res = await fetch('/api/auth/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    window.location.href = '/user/dashboard';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
